# Docker Compose Beef Sync - com conexão ao PostgreSQL
# Cole isso no Kodee para configurar DATABASE_URL e rede
# IMPORTANTE: Ajuste o nome da rede (beef_sync_default) conforme o resultado de: docker network ls

version: '3.8'

services:
  beefsync-app:
    image: zeca85/beefsync:latest
    container_name: beefsync-app
    restart: unless-stopped
    ports:
      - "3020:3020"
    environment:
      - NODE_ENV=production
      # Host "postgres" = nome do serviço no docker-compose do Evolution
      # Banco beef_sync: crie antes com: docker exec evolution-postgres psql -U evolution -d evolution -c "CREATE DATABASE beef_sync;"
      - DATABASE_URL=postgresql://evolution:evolution123@postgres:5432/beef_sync
    networks:
      - beef_sync_default

networks:
  beef_sync_default:
    external: true
