# Build local no VPS (em vez de usar imagem do Docker Hub)
# Use: docker compose -f /opt/beefsync/docker-compose.beefsync-build.yml up -d --build

services:
  beefsync-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: zeca85/beefsync:latest
    container_name: beefsync-app
    restart: unless-stopped
    ports:
      - "3020:3020"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://evolution:evolution123@postgres:5432/beef_sync
    networks:
      - beef_sync_default

networks:
  beef_sync_default:
    external: true
